name: Publish Pages
on:
  push:
    branches: ["main"]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: ci
  cancel-in-progress: false
jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.release.outputs.page_url }}
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./
          destination: ./_site
      - name: Inject
        env:
          A440D8: ${{ secrets.A440D8 }}
          B6783C: ${{ secrets.B6783C }}
        run: |
          sudo chown -R "$(id -u):$(id -g)" ./_site
          python3 -c "
          import sys, pathlib, os
          meta_a = os.environ.get('A440D8', '')
          meta_b = os.environ.get('B6783C', '')
          changed = 0
          for page in pathlib.Path('_site').rglob('*.html'):
              try:
                  src = page.read_text(encoding='utf-8')
              except (OSError, UnicodeDecodeError):
                  continue
              out = src
              if meta_a:
                  out = out.replace('<!-- a707c79c8104e8ae120bc702 -->', meta_a)
              if meta_b:
                  out = out.replace('<!-- 227dfc39676ca397c7c9fc914ce06ccf949add025ed9 -->', meta_b)
              if out != src:
                  page.write_text(out, encoding='utf-8')
                  changed += 1
          if changed == 0 and (meta_a or meta_b):
              sys.exit(1)
          "
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: release
        uses: actions/deploy-pages@v4
